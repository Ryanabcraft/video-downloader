<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Downloader</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0c29;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container { width: 100%; max-width: 500px; padding: 24px; }
    h1 { text-align: center; font-size: 24px; margin-bottom: 24px; }
    h1 span { background: linear-gradient(90deg,#f7971e,#ffd200); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 20px;
    }
    .input-group { display: flex; gap: 8px; }
    input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #f7971e; }
    input::placeholder { color: #6b6b80; }
    button {
      padding: 12px 24px;
      background: linear-gradient(135deg,#f7971e,#ffd200);
      border: none;
      border-radius: 8px;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { opacity: .9; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #result { margin-top: 16px; text-align: center; }
    .error { color: #ff6b6b; }
    .success { color: #4caf50; }
    a {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 20px;
      background: linear-gradient(135deg,#f7971e,#ffd200);
      color: #1a1a2e;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .footer { text-align: center; margin-top: 16px; font-size: 12px; color: #6b6b80; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #f7971e;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 12px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 <span>Video Downloader</span></h1>
    <div class="card">
      <div class="input-group">
        <input type="url" id="urlInput" placeholder="Cole o link do vídeo..." autocomplete="off">
        <button id="btn">Baixar</button>
      </div>
      <div id="result"></div>
    </div>
    <div class="footer">TikTok · Shopee · Pinterest · ML Clips · RedNote · Facebook · Reels</div>
  </div>
  <script>
    const input = document.getElementById('urlInput');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');

    btn.onclick = async () => {
      const url = input.value.trim();
      if (!url) return;

      btn.disabled = true;
      btn.textContent = 'Baixando...';
      result.innerHTML = '<div class="spinner"></div>';

      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();

        if (!res.ok) {
          result.innerHTML = `<p class="error">${data.error}</p>`;
          return;
        }

        const mb = (data.size / 1024 / 1024).toFixed(1);
        result.innerHTML = `
          <p class="success">Download concluído! (${mb}MB)</p>
          <a href="${data.file}" download>⬇️ Baixar Vídeo</a>
        `;
      } catch (e) {
        result.innerHTML = '<p class="error">Erro de conexão</p>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Baixar';
      }
    };

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
  </script>
</body>
</html>
